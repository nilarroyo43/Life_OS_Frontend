<div class="min-h-screen bg-gray-50 p-8">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Mis Espacios de Trabajo</h1>
    <p class="text-gray-600">Gestiona tus categorías y tareas</p>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (category of categories; track category.id) {
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
        
        <div [routerLink]="['/workspace', category.id]" class="cursor-pointer flex-1 group">
          
          <div class="h-2 w-full" [style.backgroundColor]="category.color || '#4f46e5'"></div>

          <div class="p-6">
            <h2 class="text-xl font-bold text-gray-800 group-hover:text-blue-600 transition-colors">
              {{ category.name }}
            </h2>
            <p class="text-gray-500 text-sm mt-2 line-clamp-2">
              {{ category.description || 'Sin descripción' }}
            </p>
          </div>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-2 mt-auto">
          <button
            (click)="onDeleteCategory(category)"
            class="text-red-600 hover:text-red-800 text-sm font-medium"
          >
            Eliminar
          </button>
        </div>
      </div>

    } @empty {
      <div class="col-span-full flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-dashed border-gray-300">
        <p class="text-gray-500 mt-1 text-center">{{ empty_message }}</p>
      </div>
    }

    <div class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-lg font-bold mb-4">Nueva Categoría</h2>
      <div class="flex gap-4">
        <input
          type="text"
          [(ngModel)]="newCategoryName"
          placeholder="Nombre (ej. Desarrollo)"
          class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
          required
        />

        <input
          type="text"
          [(ngModel)]="newCategoryDesc"
          required="true"
          placeholder="Descripción breve"
          class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
        />

        <input
          type="color"
          [(ngModel)]="newCategoryColor"
          class="w-12 h-10 border border-gray-300 rounded-md cursor-pointer"
        />

        <label class="flex items-center gap-2 text-sm">
          <input
            type="checkbox"
            [(ngModel)]="newCategoryHasTimeTracking"
            class="form-checkbox h-4 w-4 text-blue-600"
          />
          Trackea Tiempo
        </label>

        <button
          (click)="onCrearCategoria()"
          class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 font-medium"
        >
          Crear
        </button>
      </div>
    </div>
  </div>
</div>
