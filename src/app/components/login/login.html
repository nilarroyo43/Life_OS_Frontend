<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 space-y-6">
    
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900">LifeOS</h2>
      <p class="mt-2 text-sm text-gray-600">Inicia sesión para continuar</p>
    </div>

    <form class="space-y-4" (ngSubmit)="onSubmit()">
      
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required
          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
      </div>

      @if (errorMessage) {
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
          <p class="text-sm text-red-700">{{ errorMessage }}</p>
        </div>
      }

      <button type="submit"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
        Entrar
      </button>
    </form>

  </div>
</div>
